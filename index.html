<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title id="tab-title">PDF Redactor</title>
        <link rel="icon" type="image/x-icon" href="./assets/logo-icon.png">
        <link rel="stylesheet" href="./style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.css">
        <script src="./actions.js" defer></script>
        <script src="./script.js" defer></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf_viewer.min.js"></script>
    </head>
    <body>
        <header class="main-header">
            <!-- File Management -->
            <div class="section file-mgmt">
                <div class="file-controls-top">
                    <input type="file" id="pdf-upload" accept=".pdf" style="display: none;">
                    <button id="add-btn" class="btn btn-text">Add file</button>
                    <button id="clear-btn" class="btn btn-text disabled">Clear all</button>
                    <button id="export-btn" class="btn btn-text disabled">Export</button>
                    <button id="lang-btn" class="btn toggle-lang" data-tooltip="Switch Language">EN</button>
                    <a id="help-btn" class="btn" data-tooltip="Help" href="https://github.com/LeeBenShmaryahu/PDF-Redactor" target="_blank" style="text-decoration: none; font-weight: bold;">?</a>
                </div>
                <div class="page-counter">
                    <input id="page-num-input" type="text" class="number-input disabled" value="0">
                    <span id="pages-total-text-of">of</span> 
                    <span id="pages-total">0</span> 
                    <span id="pages-total-text">pages</span>
                </div>
            </div>

            <!-- Search -->
            <div id="search-section" class="section search-tools disabled">
                <button id="skip-first-btn" class="btn btn-icon" data-tooltip="Skip redacting first letter?">
                    <span style="font-family: sans-serif; font-weight: bold;">A**</span>
                </button>
                <button id="redact-from-btn" class="btn btn-icon" data-tooltip="Redact all matches from here">
                    <img src="./assets/redact-all-from-icon.svg" style="width: 30px; height: 30px;" alt="icon">
                </button>
                <button id="redact-current-btn" class="btn btn-icon" data-tooltip="Redact current match">
                    <img src="./assets/redact-current-icon.svg" style="width: 30px; height: 30px;" alt="icon">
                </button>
                <div class="search-container">
                    <input id="search-bar" type="text" class="search-bar" placeholder="Search..." autocomplete="off">
                    <span class="match-counter">
                        <span id="current-match-num">0</span>
                        <span>/</span>
                        <span id="total-matches-num">0</span>
                        <span id="search-matches-text"> matches</span>
                    </span>
                    <div class="search-nav">
                        <button id="search-prev-btn" class="btn btn-icon btn-small" data-tooltip="Previous">
                            <span>▲</span>
                        </button>
                        <button id="search-next-btn" class="btn btn-icon btn-small" data-tooltip="Next">
                            <span>▼</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- File Editing -->
            <div id="editing-section" class="section disabled">
                <!-- Style Controls -->
                <div id="size-selector" data-tooltip="Size">
                    <div class="spinner-container size-selector">
                        <input id="size-input" type="number" list="size-options" class="number-select-writable" value="12">
                        <datalist id="size-options">
                            <option value="8">8</option>
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="14">14</option>
                            <option value="16">16</option>
                            <option value="18">18</option>
                            <option value="20">20</option>
                            <option value="24">24</option>
                            <option value="32">32</option>
                            <option value="48">48</option>
                            <option value="72">72</option>
                        </datalist>
                        <div class="spinner-arrows">
                            <button id="size-up-btn" class="spin-up">▲</button>
                            <button id="size-down-btn" class="spin-down">▼</button>
                        </div>
                    </div>
                </div>

                <div id="font-selector" data-tooltip="Font Family">
                    <select id="font-options" class="font-dropdown">
                        <!-- Population happens in code -->
                    </select>
                </div>

                <div class="color-container">
                    <button id="color-btn" class="btn btn-color" data-tooltip="Pick Color" style="background-color: #000000;"></button>
                    <input type="color" id="color-picker" class="color-picker" value="#000000">
                </div>

                <!-- Tool Group -->
                <div>
                    <button id="tool-rect-btn" class="btn btn-icon" data-tooltip="Rectangle Tool">
                        <svg width="50" height="50" xmlns="http://www.w3.org/2000/svg">
                            <rect width="30" height="20" x="0" y="15"/>
                        </svg>
                    </button>
                    <button id="tool-paint-btn" class="btn btn-icon" data-tooltip="Paint Tool">
                        <img src="./assets/brush-icon.svg" style="width: 25px; height: 25px;" alt="icon">
                    </button>
                    <button id="tool-text-btn" class="btn btn-icon" data-tooltip="Text Tool">
                        <img src="./assets/text-icon.svg" style="width: 25px; height: 25px;" alt="icon">
                    </button>
                </div>

                <div id="zoom-selector" data-tooltip="Zoom Level">
                    <div class="zoom-selector">
                        <input id="zoom-input" list="zoom-options" class="number-select-writable" value="100%">
                        <datalist id="zoom-options">
                            <option value="50%">50%</option>
                            <option value="75%">75%</option>
                            <option value="100%">100%</option>
                            <option value="125%">125%</option>
                            <option value="150%">150%</option>
                            <option value="175%">175%</option>
                            <option value="200%">200%</option>
                            <option value="250%">250%</option>
                            <option value="300%">300%</option>
                        </datalist>
                    </div>
                </div>
            </div>
        </header>
        <main id="app-content" class="app-content">
            <div id="drop-zone" class="empty-state">
                <div class="empty-state-content">
                    <img src="./assets/upload-icon.svg" class="upload-icon" alt="Upload">
                    <h2 id="no-pdf-title">No PDF Loaded</h2>
                    <p id="no-pdf-lbl">Click to select a file or drag and drop it here</p>
                </div>
            </div>

            <div id="pdf-container" class="hidden"></div>
        </main>

        <div id="brush-cursor-preview" class="brush-cursor-preview"></div>
        <div class="logo-widget">
            <div class="logo-box">
                <img src="./assets/logo-icon.png" alt="Logo" class="logo-img">
            </div>
            <div class="logo-text">
                <div id="logo-line-1" class="line-1"></div>
                <div id="logo-line-2" class="line-2"></div>
            </div>
        </div>

        <!-- Export Menu -->
        <div id="export-modal-overlay" class="export-overlay hidden">
            <div class="export-modal">
                <div class="export-modal-header">
                    <h2 id="export-title-lbl">Export Settings</h2>
                    <button id="close-export-btn" class="btn btn-icon" style="font-size: 18px; line-height: 1;">&times;</button>
                </div>
                
                <div class="export-modal-body">
                    <div class="export-options">
                        
                        <div class="option-group">
                            <label class="option-label" id="export-scale-lbl">Export Resolution Scale</label>
                            <select id="export-scale-select" class="font-dropdown" style="max-width: 100%;">
                                <option value="1">1x (Standard)</option>
                                <option value="1.5">1.5x (Enhanced)</option>
                                <option value="2" selected>2x (High Quality)</option>
                                <option value="3">3x (Print Quality)</option>
                            </select>
                            <p class="helper-text" id="export-scale-help">Higher scales produce sharper text and redactions but increase the final file size.</p>
                        </div>

                        <div class="option-group">
                            <div class="toggle-row">
                                <label class="option-label" id="export-numbers-lbl">Add Page Numbers</label>
                                <label class="switch">
                                    <input type="checkbox" id="export-page-numbers-toggle">
                                    <span class="slider round"></span>
                                </label>
                            </div>
                            <p class="helper-text" id="export-numbers-help">Automatically stamp page numbers on the exported PDF pages.</p>
                            <label class="option-label" id="export-position-lbl">Number Position</label>
                            <select id="export-position-select" class="font-dropdown" style="max-width: 100%;">
                                <option value="top-left" selected>Top Left</option>
                                <option value="top-center">Top Center</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-center">Bottom Center</option>
                                <option value="bottom-right">Bottom Right</option>
                            </select>
                        </div>

                        <div class="export-actions">
                            <button id="final-export-btn" class="btn" style="width: 100%; padding: 12px; font-weight: bold; background-color: var(--accent-blue); color: white; border: none;">
                                Export Document
                            </button>
                        </div>
                    </div>

                    <div class="export-preview">
                        <div class="preview-canvas-container">
                            <div class="preview-placeholder">
                                <span style="opacity: 0.5;">Preview Page</span>
                            </div>
                        </div>
                        
                        <div class="preview-nav">
                            <button id="preview-prev-btn" class="btn btn-icon preview-arrow">&#9664;</button>
                            <span>
                                <span id="preview-current-lbl">Page</span> 
                                <span id="export-preview-num">1</span>
                            </span>
                            <button id="preview-next-btn" class="btn btn-icon preview-arrow">&#9654;</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
